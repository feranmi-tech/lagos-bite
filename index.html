<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos Bite | Authentic Flavors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1>LAGOS BITE</h1>
            <div class="hero-overlay">
                <p>AUTHENTIC NIGERIAN CUISINE</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#menu">MENU</a>
            <a href="#reservation">RESERVE</a>
            <a href="tel:+2348089994227">CALL</a>
        </nav>
    </header>

    <section id="menu">
        <h2 class="section-title">Our Menu</h2>
        <div class="menu-grid">
            
            <div class="menu-item">
                <img src="images/peppersoup.jpg" alt="Pepper Soup">
                <h3>Pepper Soup</h3>
                <span class="price" data-price="2500">₦2,500</span>
                <button class="add-btn">Add to Order</button>
            </div>

            <div class="menu-item">
                <img src="images/vegetablesoup.jpg" alt="Vegetable Soup">
                <h3>Vegetable Soup</h3>
                <span class="price" data-price="4500">₦4,500</span>
                <button class="add-btn">Add to Order</button>
            </div>
    
            <div class="menu-item">
                <img src="images/egusisoup.jpg" alt="Egusi Soup">
                <h3>Egusi Soup</h3>
                <span class="price" data-price="4000">₦4,000</span>
                <button class="add-btn">Add to Order</button>
            </div>

            <div class="menu-item">
                <img src="images/jollofrice.jpg" alt="Jollof Rice">
                <h3>Jollof Rice</h3>
                <span class="price" data-price="3500">₦3,500</span>
                <button class="add-btn">Add to Order</button>
            </div>

            <div class="menu-item">
                <img src="images/grilledfish.jpg" alt="Grilled Fish">
                <h3>Grilled Fish</h3>
                <span class="price" data-price="7000">₦7,000</span>
                <button class="add-btn">Add to Order</button>
            </div>

            <div class="menu-item">
                <img src="images/suyaplatter.jpg" alt="Suya Platter">
                <h3>Suya Platter</h3>
                <span class="price" data-price="5000">₦5,000</span>
                <button class="add-btn">Add to Order</button>
            </div>

        </div>
    </section>

    <section id="order-summary" style="text-align: center; padding: 40px; background: #fff;">
        <h2>Your Order</h2>
        <ul id="order-list" style="list-style: none; margin: 10px 0;"></ul>
        <p>Total: ₦<span id="total-price">0</span></p>
        
        <button id="checkout-btn" style="background: #25D366; color: white; padding: 15px 30px; border: none; cursor: pointer; border-radius: 5px;">
            Send Order via WhatsApp
        </button>
    </section>

    <section id="reservation">
        <h2 class="section-title">Book a Table</h2>
        <form id="reservationForm">
            <input type="text" placeholder="Your Name" required>
            <input type="date" required>
            <button type="submit">CONFIRM</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
